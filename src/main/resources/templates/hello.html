<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        .card {
            padding: 32px 40px;
            border: 1px solid #d6e0ef;
            border-radius: 12px;
            background: white;
            text-align: center;
            box-shadow: 0 12px 30px rgba(25, 40, 70, 0.1);
        }

        .badge {
            display: inline-block;
            margin-bottom: 12px;
            padding: 5px 10px;
            border-radius: 999px;
            background: #e8f0ff;
            color: #2455c3;
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<main class="card">
    <span class="badge">HTML Template</span>
    <h1>Hello World!</h1>
</main>
</body>
</html>
