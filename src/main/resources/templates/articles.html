<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1 th:text="${boardTitle}"></h1>
    <hr>

    <div th:each="article : ${articles.values()}">
        <a th:href="@{/article/{id}(id=${article.id})}" style="text-decoration: none; color: black;">
            <h2 th:text="${article.title}"></h2>
        </a>
        <div th:text="${members.get(article.getMemberId()).getNickName() + ' | ' + article.getLDT()}"></div>
        <div th:text="${article.getDescription()}"></div>
    </div>
</body>
</html>
