<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1 th:text="${boardTitle}"></h1>

    <div th:each="article : ${articles.values()}">
        <h2 th:text="${article.getTitle()}"></h2>
        <p th:text="${article.getMemberId()+ ' | ' +article.getLDT()}"></p>
        <p th:text="${article.getDescription()}"></p>
    </div>
</body>
</html>
